<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="260" viewBox="0 0 1160 260">
  <defs>
    <style>
      .box { fill: #ffffff; stroke: #1677ff; stroke-width: 2; rx: 10; ry: 10; }
      .t { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans"; font-size: 14px; fill: #111827; }
      .s { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans"; font-size: 12px; fill: #374151; }
      .arrow { stroke: #6b7280; stroke-width: 2; fill: none; marker-end: url(#m); }
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="10" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#6b7280"/>
    </marker>
  </defs>

  <rect class="box" x="30" y="40" width="200" height="80"/>
  <text class="t" x="130" y="70" text-anchor="middle">准备材料</text>
  <text class="s" x="130" y="95" text-anchor="middle">work/inputs/&lt;project&gt;/...</text>

  <path class="arrow" d="M230 80 L290 80"/>

  <rect class="box" x="290" y="40" width="200" height="80"/>
  <text class="t" x="390" y="70" text-anchor="middle">导入规则</text>
  <text class="s" x="390" y="95" text-anchor="middle">上传 rules.xlsx</text>

  <path class="arrow" d="M490 80 L550 80"/>

  <rect class="box" x="550" y="40" width="200" height="80"/>
  <text class="t" x="650" y="70" text-anchor="middle">配置项目关系</text>
  <text class="s" x="650" y="95" text-anchor="middle">上传 config.xlsx（跳过部分检查）</text>

  <path class="arrow" d="M750 80 L810 80"/>

  <rect class="box" x="810" y="40" width="200" height="80"/>
  <text class="t" x="910" y="70" text-anchor="middle">开始扫描</text>
  <text class="s" x="910" y="95" text-anchor="middle">大模型判定 + 证据</text>

  <path class="arrow" d="M1010 80 L1070 80"/>

  <rect class="box" x="1070" y="40" width="140" height="80"/>
  <text class="t" x="1140" y="70" text-anchor="middle">导出报告</text>
  <text class="s" x="1140" y="95" text-anchor="middle">下载 Excel</text>

  <rect x="30" y="150" width="1100" height="1" fill="#e5e7eb"/>
  <text class="s" x="30" y="178">提示：结果表格支持展开查看“证据区”（文件 + 摘录）。</text>
</svg>
